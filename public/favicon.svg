<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A0F3D"/>
      <stop offset="1" stop-color="#0A0418"/>
    </linearGradient>
    <radialGradient id="orb" cx="42%" cy="38%" r="70%">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="45%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- estrellas -->
  <circle cx="110" cy="120" r="4" fill="#FBBF24" opacity="0.9"/>
  <circle cx="410" cy="150" r="5" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="380" cy="380" r="4" fill="#10B981" opacity="0.8"/>
  <circle cx="130" cy="400" r="3" fill="#F43F5E" opacity="0.8"/>
  <!-- anillo orbital -->
  <ellipse cx="256" cy="256" rx="170" ry="62" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.55" transform="rotate(-24 256 256)"/>
  <!-- mente / orbe -->
  <circle cx="256" cy="248" r="112" fill="url(#orb)"/>
  <circle cx="256" cy="248" r="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>
  <!-- chispa de idea -->
  <path d="M256 196 l14 40 42 6 -32 28 9 42 -33 -22 -33 22 9 -42 -32 -28 42 -6 z" fill="#FBBF24"/>
</svg>
